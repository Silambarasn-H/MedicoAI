# ============================================================
# MedicoAI – Development Profile
# Usage: mvn spring-boot:run  (active by default)
# ============================================================

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/medicoai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Sandy@2409
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── CORS (allow local React dev server) ───────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173

# ── Dev mode: return resetLink in API response for testing ─
app.dev-mode=true

# ── Logging ───────────────────────────────────────────────
logging.level.com.medicoai=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
