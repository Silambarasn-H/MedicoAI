# ============================================================
# MedicoAI – Production Profile
# Usage: java -jar app.jar --spring.profiles.active=prod
# All secrets MUST be supplied as environment variables.
# ============================================================

# ── Database ──────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ───────────────────────────────────────────────────
# 'validate' in prod — never auto-alter schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── CORS (production frontend URL) ────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://medicoai.vercel.app}

# ── Dev mode disabled in production ───────────────────────
app.dev-mode=false

# ── Security hardening ────────────────────────────────────
server.error.include-stacktrace=never
server.error.include-message=never

# ── Logging ───────────────────────────────────────────────
logging.level.com.medicoai=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ── Swagger disabled in production ────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
