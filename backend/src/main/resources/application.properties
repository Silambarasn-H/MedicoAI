# ============================================================
# MedicoAI – Base Configuration (shared across all profiles)
# Active profile is set via: --spring.profiles.active=prod
# ============================================================

spring.application.name=MedicoAI
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── JPA (shared) ──────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:bWVkaWNvYWlfc3VwZXJfc2VjcmV0X2p3dF9rZXlfMjAyNF9jaGFuZ2VfaW5fcHJvZA==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Password Reset ────────────────────────────────────────
# Frontend URL used in the reset email link
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
# Reset token validity in minutes
app.reset-token.expiry-minutes=${RESET_TOKEN_EXPIRY_MINUTES:15}

# ── Mail ──────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sandhrusilambu@gmail.com
# Gmail App Password — 16 chars, NO spaces
spring.mail.password=hulfexghspiemaj
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true

# ── Active profile (override with env var or CLI arg) ─────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
